<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شاهين</title>

<style>
body{
    margin:0;
    font-family:Arial;
    direction:rtl;
    background:#0b1a2a;
    color:#fff;
}

/* النافبار */
nav{
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    background:#eee;
    color:#000;
}

nav ul{
    list-style:none;
    display:flex;
    gap:20px;
}

nav a{
    text-decoration:none;
    color:#000;
}

/* الهيرو */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff7b42,#ff5c3a);
    text-align:center;
}

.hero h1{
    font-size:60px;
}

.hero p{
    font-size:20px;
}

/* زر */
.btn{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:20px;
    background:#fff;
    color:#ff5c3a;
    cursor:pointer;
    font-size:16px;
    text-decoration:none;
}

/* خدمات */
.section{
    padding:60px;
    text-align:center;
}

.boxes{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.box{
    background:#1c2b3f;
    padding:20px;
    border-radius:10px;
}

/* ===== الأعمال الاحترافية ===== */
.portfolio{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

.project{
    background:#1c2b3f;
    border-radius:15px;
    overflow:hidden;
    width:300px;
    text-align:center;
    transition:0.3s;
}

.project:hover{
    transform:translateY(-10px);
}

.project img{
    width:100%;
}

.project h3{
    margin:10px 0;
}

.project p{
    font-size:14px;
    padding:0 10px;
}

.project .btn{
    display:inline-block;
    margin:15px;
    padding:10px 20px;
    background:#ff7b42;
    color:#fff;
    border-radius:20px;
}

</style>

</head>

<body>

<!-- navbar -->
<nav>
<h2>شاهين</h2>
<ul>
<li><a href="#">الرئيسية</a></li>
<li><a href="#services">الخدمات</a></li>
<li><a href="#work">الأعمال</a></li>
<li><a href="#">تواصل</a></li>
</ul>
</nav>

<!-- hero -->
<div class="hero">
<h1>شاهين</h1>
<p>🚀 مصمم مواقع احترافية</p>

<button class="btn" onclick="goPricing()">ابدأ الآن</button>
</div>

<!-- الخدمات -->
<div class="section" id="services">
<h2>🔥 خدماتي</h2>

<div class="boxes">
<div class="box">💻 تصميم مواقع</div>
<div class="box">🎨 تصميم احترافي</div>
<div class="box">🚀 سرعة عالية</div>
</div>

</div>

<!-- الأعمال -->
<div class="section" id="work">
<h2>🎨 أعمالي</h2>

<div class="portfolio">

<div class="project">
<img src="https://via.placeholder.com/300x200">
<h3>موقع شركة</h3>
<p>تصميم موقع احترافي لشركة خدمات</p>
<a href="#" class="btn">عرض</a>
</div>

<div class="project">
<img src="https://via.placeholder.com/300x200">
<h3>متجر إلكتروني</h3>
<p>متجر كامل مع نظام طلب</p>
<a href="#" class="btn">عرض</a>
</div>

<div class="project">
<img src="https://via.placeholder.com/300x200">
<h3>موقع شخصي</h3>
<p>موقع عصري وسريع</p>
<a href="#" class="btn">عرض</a>
</div>

</div>

</div>

<script>
function goPricing(){
    window.location.href = "pricing.html";
}
</script>

</body>
</html>
