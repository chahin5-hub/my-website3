<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شاهين</title>

<style>
body{
    margin:0;
    font-family:Arial;
    direction:rtl;
    background:#0b1a2a;
    color:#fff;
}

/* النافبار */
nav{
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    background:#eee;
    color:#000;
}

nav ul{
    list-style:none;
    display:flex;
    gap:20px;
}

nav a{
    text-decoration:none;
    color:#000;
}

/* الهيرو */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff7b42,#ff5c3a);
    text-align:center;
}

.hero h1{
    font-size:60px;
}

.hero p{
    font-size:20px;
}

/* زر */
.btn{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:20px;
    background:#fff;
    color:#ff5c3a;
    cursor:pointer;
    font-size:16px;
}

/* خدمات */
.section{
    padding:60px;
    text-align:center;
}

.boxes{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.box{
    background:#1c2b3f;
    padding:20px;
    border-radius:10px;
}

</style>

</head>

<body>

<!-- navbar -->
<nav>
<h2>شاهين</h2>
<ul>
<li><a href="#">الرئيسية</a></li>
<li><a href="#services">الخدمات</a></li>
<li><a href="#work">الأعمال</a></li>
<li><a href="#">تواصل</a></li>
</ul>
</nav>

<!-- hero -->
<div class="hero">
<h1>شاهين</h1>
<p>🚀 مصمم مواقع احترافية</p>

<!-- الزر المهم -->
<button class="btn" onclick="goPricing()">ابدأ الآن</button>

</div>

<!-- الخدمات -->
<div class="section" id="services">
<h2>🔥 خدماتي</h2>

<div class="boxes">
<div class="box">💻 تصميم مواقع</div>
<div class="box">🎨 تصميم احترافي</div>
<div class="box">🚀 سرعة عالية</div>
</div>

</div>

<!-- أعمال -->
<div class="section" id="work">
<h2>🎨 أعمالي</h2>

<div class="boxes">
<div class="box">مشروع 1</div>
<div class="box">مشروع 2</div>
<div class="box">مشروع 3</div>
</div>

</div>

<script>
function goPricing(){
    window.location.href = "pricing.html";
}
</script>

</body>
</html>
