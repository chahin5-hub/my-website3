<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلب موقع</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="section">
<h2>📩 اطلب موقعك الآن</h2>

<form onsubmit="sendWhatsApp(); return false;" class="form">

<input type="text" id="name" placeholder="اسمك" required>
<br><br>

<input type="text" id="service" placeholder="نوع الموقع (شركة / متجر / شخصي)" required>
<br><br>

<textarea id="details" placeholder="تفاصيل المشروع"></textarea>
<br><br>

<button class="btn">إرسال الطلب</button>

</form>

</section>

<!-- زر واتساب -->
<a href="https://wa.me/213673757838" class="whatsapp-float">💬</a>

<script>

function sendWhatsApp(){

let name = document.getElementById("name").value;
let service = document.getElementById("service").value;
let details = document.getElementById("details").value;

let message = `مرحبا، اسمي ${name}%0Aأريد: ${service}%0Aالتفاصيل: ${details}`;

window.open(`https://wa.me/213673757838?text=${message}`);

}

</script>

</body>
</html>
