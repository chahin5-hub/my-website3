<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تواصل معي</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

/* SECTION */
.section{
padding:80px 20px;
}

/* TITLE */
h1{
margin-bottom:30px;
}

/* BOX */
.contact-box{
background:#1e293b;
padding:30px;
border-radius:15px;
max-width:400px;
margin:auto;
}

/* BUTTON */
.btn{
display:block;
margin:15px 0;
padding:12px;
border-radius:25px;
text-decoration:none;
color:white;
font-weight:bold;
}

/* COLORS */
.phone{ background:#2563eb; }
.whatsapp{ background:#25d366; }
.facebook{ background:#1877f2; }
.instagram{ background:linear-gradient(45deg,#feda75,#d62976,#962fbf); }

.btn:hover{
opacity:0.8;
}

</style>

</head>

<body>

<section class="section">

<h1>📞 تواصل معي</h1>

<div class="contact-box">

<!-- رقمك -->
<a class="btn phone" href="tel:0555555555">
📱 اتصل بي: 0555555555
</a>

<!-- واتساب -->
<a class="btn whatsapp" href="https://wa.me/213555555555?text=مرحبا أريد تصميم موقع">
💬 واتساب
</a>

<!-- فيسبوك -->
<a class="btn facebook" href="https://facebook.com/YOUR_USERNAME" target="_blank">
📘 فيسبوك
</a>

<!-- انستغرام -->
<a class="btn instagram" href="https://instagram.com/YOUR_USERNAME" target="_blank">
📸 إنستغرام
</a>

</div>

</section>

</body>
</html>
