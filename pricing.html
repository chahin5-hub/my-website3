<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الباقات</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1a2a;
    color:#fff;
    direction:rtl;
}

/* عنوان */
.title{
    text-align:center;
    margin-top:50px;
    font-size:40px;
}

/* الباقات */
.pricing{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:50px;
    flex-wrap:wrap;
}

.card{
    background:#1c2b3f;
    padding:30px;
    border-radius:15px;
    width:250px;
    text-align:center;
}

.active{
    border:2px solid #00ff88;
}

.price{
    color:#ff7b42;
    font-size:25px;
}

.btn{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#fff;
    color:#ff7b42;
    cursor:pointer;
}

/* جدول */
table{
    width:90%;
    margin:60px auto;
    border-collapse:collapse;
}

td, th{
    border:1px solid #2c3e50;
    padding:15px;
    text-align:center;
}

th{
    background:#13263a;
}

.check{color:#00ff88;}
.cross{color:red;}

</style>

</head>

<body>

<h1 class="title">💰 الباقات</h1>

<div class="pricing">

<div class="card">
<h3>عادية</h3>
<p class="price">0.5 مليون دج</p>
<button class="btn">اطلب</button>
</div>

<div class="card active">
<h3>احترافية</h3>
<p class="price">1 مليون دج</p>
<button class="btn">اطلب</button>
</div>

<div class="card">
<h3>VIP</h3>
<p class="price">2 مليون دج</p>
<button class="btn">اطلب</button>
</div>

</div>

<table>

<tr>
<th>الميزة</th>
<th>عادية</th>
<th>احترافية</th>
<th>VIP</th>
</tr>

<tr>
<td>تصميم</td>
<td class="check">✔</td>
<td class="check">✔✔</td>
<td class="check">✔✔✔</td>
</tr>

<tr>
<td>سرعة</td>
<td>عادي</td>
<td>جيد</td>
<td>سريع جداً</td>
</tr>

<tr>
<td>دعم</td>
<td class="cross">✖</td>
<td class="check">✔</td>
<td class="check">✔✔</td>
</tr>

</table>

</body>
</html>
