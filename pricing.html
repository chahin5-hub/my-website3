

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الباقات | شاهين</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Cairo',sans-serif;
    background:#0f172a;
    color:white;
}

/* TITLE */
.title{
    text-align:center;
    margin-top:60px;
    font-size:30px;
}

/* PRICING */
.pricing{
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
    padding:60px 20px;
}

/* CARD */
.card{
    background:#1e293b;
    width:260px;
    padding:30px;
    border-radius:15px;
    text-align:center;
    transition:0.3s;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.card:hover{
    transform:translateY(-10px) scale(1.03);
}

/* TITLE */
.card h3{
    margin-bottom:10px;
    font-size:22px;
}

/* PRICE */
.card h2{
    color:#f97316;
    margin:20px 0;
    font-size:26px;
}

/* BUTTON */
.btn{
    display:inline-block;
    background:white;
    color:#f97316;
    padding:10px 20px;
    border-radius:25px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    background:#f97316;
    color:white;
}

/* VIP SPECIAL */
.vip{
    border:2px solid #f97316;
    transform:scale(1.05);
}

.vip:hover{
    transform:scale(1.1);
}

/* RESPONSIVE */
@media(max-width:768px){
    .pricing{
        flex-direction:column;
        align-items:center;
    }
}

</style>
</head>

<body>

<h1 class="title">💰 الباقات</h1>

<section class="pricing">

    <!-- عادية -->
    <div class="card">
        <h3>عادية</h3>
        <h2>0.5 مليون دج</h2>
        <p>موقع بسيط + تصميم جيد</p>
        <a class="btn" href="https://wa.me/213673757838?text=طلب باقة عادية">اطلب</a>
    </div>

    <!-- احترافية -->
    <div class="card">
        <h3>احترافية</h3>
        <h2>1 مليون دج</h2>
        <p>تصميم احترافي + سرعة عالية</p>
        <a class="btn" href="https://wa.me/213673757838?text=طلب باقة احترافية">اطلب</a>
    </div>

    <!-- VIP -->
    <div class="card vip">
        <h3>VIP</h3>
        <h2>2 مليون دج</h2>
        <p>موقع كامل + دعم + إضافات</p>
        <a class="btn" href="https://wa.me/213673757838?text=طلب VIP">اطلب</a>
    </div>

</section>

</body>
</html>
